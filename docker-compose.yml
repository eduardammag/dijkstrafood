services:
  localstack:
    image: localstack/localstack:3
    container_name: dijkstrafood-localstack
    environment:
      SERVICES: kinesis
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:16
    container_name: dijkstrafood-postgres
    environment:
      POSTGRES_DB: dijkstrafood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dijkstrafood"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: dijkstrafood-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: ./order-service
    container_name: dijkstrafood-api
    environment:
      USE_DYNAMO: "True"
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      DYNAMO_TABLE: ${DYNAMO_TABLE}
      ANALYTICS_ENABLED: "false"
      DB_HOST: postgres
      DB_NAME: dijkstrafood
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_SSLMODE: disable
      RESTAURANT_SIMULATOR_URL: http://restaurant-simulator:8004
      REQUEST_TIMEOUT_SECONDS: 15
      KINESIS_ENABLED: "true"
      KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-dijkfood-order-events}
      KINESIS_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  restaurant-simulator:
    build: ./restaurant-simulator
    container_name: dijkstrafood-restaurant-simulator
    environment:
      API_URL: http://api:8000
      DELIVERY_SERVICE_URL: http://delivery-service:8001
      REQUEST_TIMEOUT_SECONDS: 15
      ACCEPTANCE_RATE: 1.0
      CONFIRMED_DELAY_SECONDS: 0.4
      PREPARING_DELAY_SECONDS: 0.8
    ports:
      - "8004:8004"
    depends_on:
      api:
        condition: service_started

  routing-service:
    build:
      context: ./delivery-service
      dockerfile: routing_service/Dockerfile
    container_name: dijkstrafood-routing-service
    ports:
      - "8002:8002"

  delivery-service:
    build: ./delivery-service
    container_name: dijkstrafood-delivery-service
    environment:
      API_URL: http://api:8000
      ROUTING_URL: http://routing-service:8002/rota
      COURIER_SIMULATOR_URL: http://restaurant-simulator:8004
      REQUEST_TIMEOUT_SECONDS: 15
    ports:
      - "8001:8001"
    depends_on:
      api:
        condition: service_started
      routing-service:
        condition: service_started
      restaurant-simulator:
        condition: service_started

  realtime-metrics-service:
    build: ./realtime_metrics_service
    container_name: dijkstrafood-realtime-metrics-service
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-dijkfood-order-events}
      KINESIS_ENDPOINT_URL: http://localstack:4566
      KINESIS_ITERATOR_TYPE: ${KINESIS_ITERATOR_TYPE:-LATEST}
      KINESIS_POLL_INTERVAL_SECONDS: ${KINESIS_POLL_INTERVAL_SECONDS:-1}
      KINESIS_RECORDS_LIMIT: ${KINESIS_RECORDS_LIMIT:-500}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-dijkfood:realtime}
      REDIS_SNAPSHOT_TTL_SECONDS: ${REDIS_SNAPSHOT_TTL_SECONDS:-120}
    ports:
      - "8010:8010"
    depends_on:
      localstack:
        condition: service_started
      redis:
        condition: service_healthy

  kinesis-init:
    image: amazon/aws-cli:2.17.30
    container_name: dijkstrafood-kinesis-init
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      KINESIS_STREAM_NAME: ${KINESIS_STREAM_NAME:-dijkfood-order-events}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until aws --endpoint-url=http://localstack:4566 kinesis list-streams >/dev/null 2>&1; do sleep 1; done;
      aws --endpoint-url=http://localstack:4566 kinesis create-stream --stream-name $$KINESIS_STREAM_NAME --shard-count 1 || true"
    depends_on:
      localstack:
        condition: service_started

volumes:
  postgres_data:
